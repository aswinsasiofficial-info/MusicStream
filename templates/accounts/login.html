{% extends 'base.html' %}
{% load static %}

{% block title %}Login - MusicStream{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card bg-dark text-white p-5" style="max-width: 450px; width: 100%; border-radius: 12px;">
        <div class="text-center mb-4">
            <h1 class="mb-3"><i class="bi bi-soundwave text-accent"></i> MusicStream</h1>
            <h3>Log in to MusicStream</h3>
        </div>
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" 
                       class="form-control bg-dark text-white border-secondary" 
                       id="email" 
                       name="email" 
                       required 
                       autofocus>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" 
                       class="form-control bg-dark text-white border-secondary" 
                       id="password" 
                       name="password" 
                       required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block w-100 py-3 mb-3">
                Log In
            </button>
            
            <div class="text-center mt-4">
                <p class="mb-0">Don't have an account? 
                    <a href="{% url 'register' %}" class="text-accent">Sign up</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
